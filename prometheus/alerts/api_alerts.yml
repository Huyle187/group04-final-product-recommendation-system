# API Alert Rules
# TODO: ====Define alert rules for API performance====

groups:
  - name: api_alerts
    interval: 30s
    rules:
      # Alert when error rate exceeds threshold for 5 minutes
      - alert: HighErrorRate
        expr: |
          rate(http_requests_total{status=~"5.."}[5m]) 
          / rate(http_requests_total[5m]) > 0.1
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "High error rate detected"
          description: "Error rate is {{ $value | humanizePercentage }} (threshold: 10%)"

      # Alert when P95 latency exceeds threshold
      - alert: HighLatency
        expr: |
          histogram_quantile(0.95, 
            sum by (le) (rate(http_request_duration_seconds_bucket[5m]))
          ) > 1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High latency detected"
          description: "P95 latency is {{ $value }}s (threshold: 1s)"

      # Alert when API is not responding
      - alert: APIDown
        expr: up{job="recommendation-api"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Recommendation API is down"
          description: "The API has been unreachable for 1 minute"

      # High Request Rate Alert
      # Trigger when request rate exceeds a threshold (e.g., 1000 req/s)
      # This could indicate a DDoS attack or unusual traffic
      # Severity: warning

      - alert: HighRequestRate
        # Ngưỡng 500 req/s: phù hợp với throughput thực tế ~750 req/s của hệ thống
        # for: 30s để Alert FIRE nhanh khi demo (đủ để AlertManager nhận)
        expr: sum(rate(http_requests_total{endpoint!="/metrics"}[1m])) > 500
        for: 30s
        labels:
          severity: warning
        annotations:
          summary: "High request rate detected"
          description: "Request rate is {{ $value | humanize }} req/s (threshold: 500)."

      # Low Request Rate Alert
      # Trigger when request rate drops below expected minimum
      # Could indicate service issues or upstream problems
      # Severity: warning
      
      - alert: LowRequestRate
        # Dùng [2m] thay vì [5m] để phản ứng nhanh hơn khi traffic dừng
        # for: 3m thay vì 10m để resolve/fire nhanh hơn khi demo
        expr: sum(rate(http_requests_total{endpoint!="/metrics"}[2m])) < 0.1
        for: 3m
        labels:
          severity: warning
        annotations:
          summary: "Unusually low request rate"
          description: "Request rate is {{ $value | humanize }} req/s - system may be idle or down"