# API Alert Rules
# TODO: ====Define alert rules for API performance====

groups:
  - name: api_alerts
    interval: 30s
    rules:
      # TODO: ====High error rate alert====
      # Alert when error rate exceeds threshold for 5 minutes
      - alert: HighErrorRate
        expr: |
          (rate(errors_total[5m]) / rate(http_requests_total[5m])) > 0.05
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "High error rate on API"
          description: "Error rate is {{ $value | humanizePercentage }}"

      # TODO: ====High latency alert====
      # Alert when P95 latency exceeds threshold
      - alert: HighLatency
        expr: |
          histogram_quantile(0.95, rate(http_request_duration_seconds_bucket[5m])) > 1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High API latency detected"
          description: "P95 latency is {{ $value }}s"

      # TODO: ====API down alert====
      # Alert when API is not responding
      - alert: APIDown
        expr: up{job="recommendation-api"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Recommendation API is down"
          description: "The API has been unreachable for 1 minute"
