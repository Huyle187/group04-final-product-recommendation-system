# Product Recommendation System - Pytest Configuration

[pytest]
# Minimum version
minversion = 7.0

# Test paths
testpaths = tests

# Python files patterns
python_files = test_*.py *_test.py

# Test functions
python_functions = test_*

# Classes
python_classes = Test*

# Options
addopts = 
    -v
    --strict-markers
    --tb=short
    --disable-warnings

# Markers for different test types
markers =
    unit: Unit tests for individual components
    integration: Integration tests for API endpoints
    e2e: End-to-end tests
    slow: Slow running tests
    performance: Performance/load tests
    smoke: Smoke tests
    todo: TODO tests not yet implemented

# Coverage options
[coverage:run]
source = app
omit = 
    */tests/*
    */venv/*

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
    if TYPE_CHECKING:
    @abstractmethod
    @abc.abstractmethod
    TODO: ====.*====
