# GitHub Actions CI/CD Pipeline
# TODO: ====Implement full CI/CD pipeline====

name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  # ===========================================================================
  # Code Quality & Linting
  # ===========================================================================
  lint:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8 black isort mypy
      
      - name: Format check with black
        run: black --check app/ tests/ scripts/
      
      - name: Import sort check with isort
        run: isort --check-only app/ tests/ scripts/
      
      - name: Lint with flake8
        run: flake8 app/ tests/ scripts/ --count --select=E9,F63,F7,F82 --show-source --statistics
      
      - name: Type check with mypy
        run: mypy app/ --ignore-missing-imports
        continue-on-error: true

  # ===========================================================================
  # Testing
  # ===========================================================================
  test:
    runs-on: ubuntu-latest
    needs: lint
    
    services:
      prometheus:
        image: prom/prometheus:v2.48.0
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Run tests with pytest
        run: pytest tests/ -v --cov=app --cov-report=xml --cov-report=html
      
      - name: Upload coverage
        uses: codecov/codecov-action@v3
        with:
          file: ./coverage.xml
          flags: unittests
          name: codecov-umbrella

  # ===========================================================================
